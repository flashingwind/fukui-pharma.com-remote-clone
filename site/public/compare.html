<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>旧版 vs 新版 比較</title>
<style>
body { font-family: sans-serif; margin: 0; }
h1 { padding: 10px 20px; background: #333; color: #fff; margin: 0; }
.nav { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 20px; background: #eee; }
.nav a { padding: 4px 10px; background: #fff; border: 1px solid #999; border-radius: 4px; text-decoration: none; color: #333; font-size: 13px; }
.nav a:hover { background: #333; color: #fff; }
.compare { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 100px); }
.pane { overflow: auto; border: 1px solid #ccc; }
.pane h2 { margin: 0; padding: 8px 12px; font-size: 14px; background: #ddd; position: sticky; top: 0; }
.pane.old h2 { background: #fdd; }
.pane.new h2 { background: #dfd; }
pre { margin: 0; padding: 12px; white-space: pre-wrap; font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>
<h1>旧版（minerals/vitamins）vs 新版（vitamin-mineral）比較</h1>
<div class="nav">
  <a href="#" onclick="load('cganyuu')">ビタミンC</a>
  <a href="#" onclick="load('eganyuu')">ビタミンE</a>
  <a href="#" onclick="load('dganyuu')">ビタミンD</a>
  <a href="#" onclick="load('bkganyuu')">ビタミンK</a>
  <a href="#" onclick="load('vanagany')">バナジウム</a>
</div>
<div class="compare">
  <div class="pane old">
    <h2>旧版（minerals/vitamins）</h2>
    <pre id="old-content">ファイルを選んでください</pre>
  </div>
  <div class="pane new">
    <h2>新版（vitamin-mineral/）</h2>
    <pre id="new-content">ファイルを選んでください</pre>
  </div>
</div>
<script>
async function load(slug) {
  const [oldRes, newRes] = await Promise.all([
    fetch('/content/vitamin-mineral/' + slug + '.md'),
  ]);
  document.getElementById('old-content').textContent = await oldRes.text();
  document.getElementById('new-content').textContent = await newRes.text();
}
</script>
</body>
</html>
