name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LOCAL_BASE_URL: http://127.0.0.1:4173
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: site

      - name: Static Reference Check
        run: npm run check-html-refs
        working-directory: site

      - name: Build
        run: npm run build
        working-directory: site

      - name: Browser Crawl Check (localhost preview)
        run: |
          set -euo pipefail
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/vite-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill ${PREVIEW_PID} || true' EXIT

          READY=0
          for i in $(seq 1 60); do
            if ! kill -0 "${PREVIEW_PID}" 2>/dev/null; then
              echo "preview process exited early"
              cat /tmp/vite-preview.log || true
              exit 1
            fi

            if curl -fsS "${LOCAL_BASE_URL}" > /dev/null; then
              READY=1
              break
            fi
            sleep 1
          done

          if [ "${READY}" -ne 1 ]; then
            echo "preview did not become ready within timeout"
            cat /tmp/vite-preview.log || true
            exit 1
          fi

          npm run check-live-browser -- "${LOCAL_BASE_URL}"
        working-directory: site

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f8b90b17ff39c08c681a498bf920723a
        run: |
          set -euo pipefail
          npm i --no-save wrangler@4.83.0
          npx wrangler pages deploy dist --project-name new-fukui-pharma
        working-directory: site
